name: build-smoke

on:
  push:
  pull_request:

jobs:
  smoke-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout module
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git cmake ninja-build gperf ccache dfu-util device-tree-compiler wget \
            python3-dev python3-pip python3-setuptools python3-wheel xz-utils file \
            make gcc gcc-multilib g++-multilib libsdl2-dev libmagic1

      - name: Install Zephyr SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.0/zephyr-sdk-0.17.0_linux-x86_64.tar.xz
          tar xf zephyr-sdk-0.17.0_linux-x86_64.tar.xz
          ./zephyr-sdk-0.17.0/setup.sh -h -c

      - name: Prepare ZMK workspace
        run: |
          mkdir -p /tmp/zmk-workspace
          cd /tmp/zmk-workspace
          git clone --depth 1 https://github.com/zmkfirmware/zmk
          west init -l zmk/app
          west update
          west zephyr-export
          pip3 install -r zmk/app/scripts/requirements.txt

      - name: Build smoke consumer
        env:
          ZEPHYR_SDK_INSTALL_DIR: /home/runner/work/zmk-driver-pmw3360/zmk-driver-pmw3360/zephyr-sdk-0.17.0
        run: |
          cd /tmp/zmk-workspace
          west build -s zmk/app -d build/smoke -b nice_nano_v2 -- \
            -DZMK_CONFIG="${GITHUB_WORKSPACE}/ci/smoke-config" \
            -DSHIELD=pmw3360_smoke \
            -DZMK_EXTRA_MODULES="${GITHUB_WORKSPACE}"
